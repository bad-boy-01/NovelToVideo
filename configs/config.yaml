# NovelToVideo Configuration

image_profiles:
  kaggle_t4:
    primary: sdxl
    fallback_1: juggernautxl
  kaggle_l4:
    primary: flux-dev
    fallback_1: sdxl
  local_24gb:
    primary: flux-dev
    fallback_1: sdxl
    fallback_2: juggernautxl

image_size:
  width: 1280
  height: 720

batch_size: 1

max_vram_usage: auto

save_every_image: true

video:
  fps: 30

tts:
  provider: kokoro

llm:
  primary_model: "google/gemini-2.5-flash"
  fallback_models:
    - "google/gemini-2.5-flash:free"
    - "meta-llama/llama-3.3-70b-instruct:free"
  max_output_tokens: 4000
  retries: 3
  retry_backoff: 2.0
